name: Regenerate blog index

on:
  push:
    paths:
      - "blogs/*.md"
      - "blogs/**/*.md"
      - "gen_index.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate blog manifest
        run: python3 gen_index.py

      - name: Commit generated blog files
        run: |
          if git diff --quiet -- blogs/index.json blogs/index.js README.md; then
            echo "Blog index is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blogs/index.json blogs/index.js README.md
          git commit -m "Regenerate blog index"
          git push
