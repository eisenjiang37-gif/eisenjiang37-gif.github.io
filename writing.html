      </div>
    </div>
    <div class="sidebar-body" id="sidebarBody">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li class="has-sub">
          <a href="research.html">Research</a>
          <ul class="sub-nav">
            <li><a href="research.html#papers">Papers</a></li>

  <!-- ═══ Main ═══ -->
  <main class="content">
    <div class="blog-layout">

      <aside class="blog-list" id="blogList">
        <div class="blog-list-header">
          <div class="blog-list-header-top">
            <div class="pg-label" style="margin-bottom:0">03 — Blog</div>
            <button class="list-toggle-btn" id="listToggle">‹ Hide</button>
          </div>
          <div class="blog-list-title">All Posts</div>
        </div>
        <div class="blog-post-list" id="postList"></div>
      </aside>

      <button class="list-expand-tab" id="listExpand">Posts ›</button>

      <div class="blog-content" id="blogContent">
        <div class="blog-welcome">Select a post →</div>
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
<script src="assets/main.js"></script>
<script>
(function () {
  'use strict';
  var BASE   = 'blogs/';
  var listEl = document.getElementById('postList');
  var bodyEl = document.getElementById('blogContent');

  async function loadManifest() {
    try {
      var res = await fetch(BASE + 'index.json');
      if (!res.ok) throw new Error();
      return await res.json();
    } catch (_) {
      listEl.innerHTML = '<p style="padding:1.5rem 2rem;font-family:\'DM Mono\',monospace;font-size:0.65rem;color:var(--text-dim)">No posts yet.</p>';
      return [];
    }
  }

  async function loadPost(post) {
    bodyEl.innerHTML = '<div class="blog-loading">Loading\u2026</div>';
    try {
      var res  = await fetch(BASE + post.file);
      if (!res.ok) throw new Error();
      var md   = await res.text();
      bodyEl.innerHTML =
        '<article class="blog-article">' +
          '<header class="blog-article-header">' +
            '<div class="pg-label">' + post.date + (post.tag ? ' &nbsp;\u00b7&nbsp; ' + post.tag : '') + '</div>' +
            '<h1 class="blog-article-title">' + esc(post.title) + '</h1>' +
          '</header>' +
          '<div class="blog-article-body">' + marked.parse(md) + '</div>' +
        '</article>';
      window.scrollTo(0, 0);
    } catch (_) {
      bodyEl.innerHTML = '<div class="blog-loading">Failed to load post.</div>';
    }
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function setActive(slug) {
    document.querySelectorAll('.blog-post-item').forEach(function (el) {
      el.classList.toggle('active', el.dataset.slug === slug);
    });
  }

  async function init() {
    var posts = await loadManifest();
    if (!posts.length) return;

    posts.forEach(function (post) {
      var slug = post.file.replace(/\.md$/, '');
      var el   = document.createElement('a');
      el.className    = 'blog-post-item';
      el.href         = '#' + slug;
      el.dataset.slug = slug;
      el.innerHTML    =
        '<span class="bpi-date">' + esc(post.date) + '</span>' +
        '<span class="bpi-title">' + esc(post.title) + '</span>' +
        (post.tag ? '<span class="bpi-tag">' + esc(post.tag) + '</span>' : '');
      el.addEventListener('click', function (e) {
        e.preventDefault();
        history.pushState(null, '', '#' + slug);
        loadPost(post);
        setActive(slug);
      });
      listEl.appendChild(el);
    });

    var hash   = location.hash.slice(1);
    var target = posts.find(function (p) { return p.file.replace(/\.md$/, '') === hash; }) || posts[0];
    loadPost(target);
    setActive(target.file.replace(/\.md$/, ''));

    window.addEventListener('popstate', function () {
      var h = location.hash.slice(1);
      var p = posts.find(function (p) { return p.file.replace(/\.md$/, '') === h; });
      if (p) { loadPost(p); setActive(p.file.replace(/\.md$/, '')); }
    });
  }

  init();

  /* ── List toggle ────────────────────────────────── */
  var layout     = document.querySelector('.blog-layout');
  var toggleBtn  = document.getElementById('listToggle');
  var expandTab  = document.getElementById('listExpand');

  function setListVisible(visible) {
    layout.classList.toggle('list-hidden', !visible);
    localStorage.setItem('blog-list-hidden', visible ? '0' : '1');
  }

  toggleBtn.addEventListener('click', function () { setListVisible(false); });
  expandTab.addEventListener('click',  function () { setListVisible(true);  });

  if (localStorage.getItem('blog-list-hidden') === '1') setListVisible(false);
})();
</script>
</body>
</html>
